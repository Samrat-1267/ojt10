{% extends 'base.html' %}
{% load static %}

{% block title %}Product Curation - TechForge{% endblock %}

{% block content %}
<section class="section page-header">
    <div class="container">
        <h1>Product Curation</h1>
        <p>Click a box, then <kbd>Ctrl+V</kbd> to paste an image. It auto-saves.</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <input type="text" id="search" class="form-input" placeholder="Search products..." oninput="filterCards()" style="margin-bottom:20px;max-width:400px;">

        <div class="cur-grid" id="grid">
            {% for p in products %}
            <div class="cur-card" data-name="{{ p.name|lower }}" data-id="{{ p.id }}">
                <form class="cur-form" method="post" enctype="multipart/form-data" action="{% url 'products:upload_curation_image' p.id %}">
                    {% csrf_token %}
                    <label class="cur-zone" id="zone{{ p.id }}" tabindex="0">
                        {% if p.has_image %}
                        <img src="{{ p.image_url }}" class="cur-img">
                        {% else %}
                        <div class="cur-empty">
                            <span class="cur-plus">+</span>
                            <small>Paste image</small>
                        </div>
                        {% endif %}
                        <input type="file" name="image" accept="image/*" class="cur-file" id="file{{ p.id }}" onchange="this.closest('form').submit()">
                    </label>
                </form>
                <div class="cur-info">{{ p.name }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<style>
.cur-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
}
.cur-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: var(--transition);
}
.cur-card:hover { border-color: var(--border-accent); }
.cur-card.hidden { display: none; }
.cur-form { margin: 0; display: block; }
.cur-zone {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    background: var(--bg-secondary);
    cursor: pointer;
    outline: none;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
}
.cur-zone:focus {
    box-shadow: inset 0 0 0 3px var(--accent-primary);
}
.cur-empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--text-muted);
}
.cur-plus {
    font-size: 3rem;
    line-height: 1;
    opacity: 0.3;
}
.cur-empty small { font-size: 0.8rem; }
.cur-file {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
}
.cur-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
}
.cur-info {
    padding: 10px 12px;
    font-size: 0.8rem;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>

<script>
var lastZone = null;

document.querySelectorAll('.cur-zone').forEach(function(z) {
    z.addEventListener('focus', function() {
        lastZone = this.id.replace('zone', '');
    });
    z.addEventListener('click', function() {
        var id = this.id.replace('zone', '');
        document.getElementById('file' + id).click();
    });
});

document.addEventListener('paste', function(e) {
    if (!lastZone) return;
    var items = e.clipboardData.items;
    for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            var file = items[i].getAsFile();
            var input = document.getElementById('file' + lastZone);
            var dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            input.closest('form').submit();
            e.preventDefault();
            return;
        }
    }
});

function filterCards() {
    var q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.cur-card').forEach(function(c) {
        var show = c.dataset.name.indexOf(q) !== -1;
        c.classList.toggle('hidden', !show);
    });
}
</script>
{% endblock %}
